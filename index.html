<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Automated News Search</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📰</text></svg>"
    />
    <style>
      /* Style lama tetap dipertahankan */
      * {
        box-sizing: border-box;
      }
      :root {
        --bg: linear-gradient(135deg, #eef2f7, #dbe4f0);
        --card-bg: #ffffff;
        --text-main: #1f2937;
        --text-muted: #6b7280;
        --border: #d1d5db;
        --primary: #2563eb;
        --danger: #ef4444;
      }
      body.dark {
        --bg: linear-gradient(135deg, #0f172a, #020617);
        --card-bg: #1e293b;
        --text-main: #e5e7eb;
        --text-muted: #9ca3af;
        --border: #334155;
        --primary: #3b82f6;
      }
      body {
        margin: 0;
        font-family: "Inter", sans-serif;
        background: var(--bg);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: background 0.3s ease;
        padding: 20px;
      }
      .card {
        background: var(--card-bg);
        padding: 32px;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 450px;
        position: relative;
      }
      .theme-toggle {
        position: absolute;
        top: -50px;
        right: 0;
        padding: 8px 16px;
        border-radius: 999px;
        background: var(--card-bg);
        border: 1px solid var(--border);
        cursor: pointer;
        font-size: 12px;
        color: var(--text-main);
        font-weight: 500;
      }
      h1 {
        color: var(--text-main);
        font-size: 22px;
        margin: 0 0 8px;
        text-align: center;
      }
      p {
        color: var(--text-muted);
        margin: 0 0 24px;
        font-size: 14px;
        text-align: center;
      }
      label {
        display: block;
        margin-bottom: 6px;
        font-size: 13px;
        font-weight: 600;
        color: var(--text-main);
      }
      input {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--text-main);
        margin-bottom: 16px;
        outline: none;
        font-family: inherit;
      }
      input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.1);
      }

      /* Tambahan Style untuk Grid Input Baru */
      .input-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-bottom: 8px;
      }

      details {
        margin-bottom: 24px;
        border: 1px solid var(--border);
        border-radius: 8px;
        overflow: hidden;
      }
      summary {
        padding: 12px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 600;
        color: var(--primary);
        background: rgba(37, 99, 235, 0.05);
        list-style: none;
      }
      .date-grid {
        padding: 12px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      .date-grid input {
        margin-bottom: 0;
      }
      .button-group {
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: 12px;
      }
      button {
        padding: 14px;
        border-radius: 10px;
        border: none;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        font-family: inherit;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
      .btn-search {
        background: var(--primary);
        color: white;
      }
      .btn-search:hover {
        opacity: 0.9;
        transform: translateY(-1px);
      }
      .btn-reset {
        background: transparent;
        color: var(--text-muted);
        border: 1px solid var(--border);
      }
      .btn-reset:hover {
        background: #fee2e2;
        color: var(--danger);
        border-color: var(--danger);
      }
      .hint {
        margin-top: 16px;
        font-size: 13px;
        color: var(--text-muted);
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <button class="theme-toggle" onclick="toggleTheme()">🌙 Dark Mode</button>
      <h1>News Search</h1>
      <p>Find global news by country and language filters.</p>

      <label for="keyword">Keyword</label>
      <input
        type="text"
        id="keyword"
        placeholder="e.g., Today's news"
        autofocus
      />

      <div class="input-grid">
        <div>
          <label title="Country Code">📍 Geolocation (GL)</label>
          <input
            type="text"
            id="gl"
            placeholder="e.g., us, es, fr..."
            maxlength="2"
          />
        </div>
        <div>
          <label title="Interface Language">🌐 Language (HL)</label>
          <input
            type="text"
            id="hl"
            placeholder="e.g., en, es, fr..."
            maxlength="2"
          />
        </div>
      </div>

      <details id="dateFilter">
        <summary>📅 Date Range Filter (Optional)</summary>
        <div class="date-grid">
          <div>
            <label>From</label>
            <input type="date" id="startDate" />
          </div>
          <div>
            <label>To</label>
            <input type="date" id="endDate" />
          </div>
        </div>
      </details>

      <div class="button-group">
        <button class="btn-search" onclick="executeSearch()">
          🔍 Open News
        </button>
        <button class="btn-reset" onclick="resetForm()">🔄 Reset</button>
      </div>

      <div class="hint">Results sorted by newest first</div>
    </div>

    <script>
      const toggleBtn = document.querySelector(".theme-toggle");
      const Toast = Swal.mixin({
        toast: true,
        position: "top",
        showConfirmButton: false,
        timer: 3000,
        timerProgressBar: true,
      });

      function toggleTheme() {
        document.body.classList.toggle("dark");
        const isDark = document.body.classList.contains("dark");
        toggleBtn.textContent = isDark ? "☀️ Light Mode" : "🌙 Dark Mode";
        localStorage.setItem("theme", isDark ? "dark" : "light");
      }

      if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark");
        toggleBtn.textContent = "☀️ Light Mode";
      }

      function resetForm() {
        document.getElementById("keyword").value = "";
        document.getElementById("gl").value = "";
        document.getElementById("hl").value = "";
        document.getElementById("startDate").value = "";
        document.getElementById("endDate").value = "";
        document.getElementById("dateFilter").removeAttribute("open");
        document.getElementById("keyword").focus();
        Toast.fire({ icon: "info", title: "Form cleared" });
      }

      function executeSearch() {
        const keyword = document.getElementById("keyword").value.trim();
        const gl = document.getElementById("gl").value.trim().toLowerCase();
        const hl = document.getElementById("hl").value.trim().toLowerCase();
        const start = document.getElementById("startDate").value;
        const end = document.getElementById("endDate").value;

        if (!keyword) {
          return Toast.fire({
            icon: "warning",
            title: "Please enter a keyword!",
          });
        }

        let tbs = "sbd:1";
        if (start || end) {
          if (start && end && start > end) {
            return Toast.fire({ icon: "error", title: "Invalid date range!" });
          }
          const s = start ? new Date(start) : new Date("2000-01-01");
          const e = end ? new Date(end) : new Date();
          const sf = `${s.getMonth() + 1}/${s.getDate()}/${s.getFullYear()}`;
          const ef = `${e.getMonth() + 1}/${e.getDate()}/${e.getFullYear()}`;
          tbs = `cdr:1,cd_min:${sf},cd_max:${ef},sbd:1`;
        }

        // Membangun URL
        let finalUrl = `https://www.google.com/search?q=${encodeURIComponent(keyword)}&tbm=nws&tbs=${tbs}`;

        if (gl) finalUrl += `&gl=${gl}`;
        if (hl) finalUrl += `&hl=${hl}`;

        window.open(finalUrl, "_blank");
      }

      document.addEventListener("keydown", (e) => {
        if (e.key === "Enter") executeSearch();
        if (e.key === "Escape") resetForm();
      });
    </script>
  </body>
</html>
